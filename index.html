<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pawl - Vitality Check</title>
<style>
  :root{
    --ink:#1c2a24; --bg:#faf7f0; --card:#ffffff; --line:#e6e0d2;
    --brand:#2f6b52; --brand-light:#e7f2eb; --accent:#e8a33d;
    --warn:#c65a2e; --muted:#7a7568;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.45;}
  .wrap{max-width:640px;margin:0 auto;padding:24px 20px 80px;}
  header.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  header.top .logo{font-weight:800;font-size:20px;color:var(--brand);letter-spacing:-0.02em;}
  .progress{display:flex;gap:6px;margin-bottom:24px;}
  .progress .seg{flex:1;height:6px;border-radius:3px;background:var(--line);}
  .progress .seg.done{background:var(--brand);}
  .progress .seg.current{background:var(--accent);}
  h1{font-size:26px;margin:0 0 6px;letter-spacing:-0.01em;}
  p.lead{color:var(--muted);margin:0 0 20px;font-size:15px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:16px;}
  .q{margin-bottom:22px;}
  .q label.qtext{display:block;font-weight:600;margin-bottom:10px;font-size:15px;}
  .q .hint{color:var(--muted);font-size:13px;margin-top:-6px;margin-bottom:10px;}
  .opts{display:flex;gap:8px;flex-wrap:wrap;}
  .opt{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 14px;cursor:pointer;font-size:14px;user-select:none;transition:all .12s;}
  .opt:hover{border-color:var(--brand);}
  .opt.sel{background:var(--brand);border-color:var(--brand);color:#fff;}
  input[type=text],input[type=number],input[type=date],input[type=file],select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fff;color:var(--ink);
  }
  input[type=range]{width:100%;}
  .bcs-scale{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  button.primary{background:var(--brand);color:#fff;border:none;border-radius:12px;padding:14px 20px;font-size:16px;font-weight:700;cursor:pointer;width:100%;}
  button.primary:hover{background:#25543f;}
  button.ghost{background:transparent;color:var(--brand);border:1px solid var(--brand);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:10px;}
  .species-toggle{display:flex;gap:10px;margin-bottom:18px;}
  .species-toggle .opt{flex:1;text-align:center;font-weight:600;}
  .unknown-toggle{margin-top:2px;margin-bottom:10px;font-size:13px;color:var(--muted);}
  .unknown-toggle label{cursor:pointer;}

  /* weight unit toggle */
  .weight-row{display:flex;gap:8px;align-items:stretch;}
  .weight-row input{flex:1;}
  .unit-toggle{display:flex;gap:4px;flex-shrink:0;}
  .unit-toggle .opt{padding:10px 12px;font-size:13px;}

  /* split date of birth */
  .dob-row{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:8px;}

  /* photo upload */
  .photo-status{color:var(--muted);font-size:13px;margin-top:6px;}

  /* body-condition chart step */
  .bcs-chart-preview{text-align:center;}
  .bcs-chart-thumb{max-width:100%;max-height:160px;border-radius:12px;border:1px solid var(--line);object-fit:contain;background:#fff;cursor:pointer;}
  .chart-btn{display:inline-block;margin-top:8px;font-size:13px;color:var(--brand);text-decoration:none;font-weight:600;border:1px solid var(--brand);border-radius:999px;padding:6px 14px;}
  .chart-btn:hover{background:var(--brand-light);}
  .bcs-readout{margin-top:14px;text-align:center;}
  .bcs-readout strong{font-size:15px;}
  .bcs-readout p{color:var(--muted);font-size:13px;margin:4px 0 0;}

  /* result card */
  .result{background:linear-gradient(155deg,var(--brand) 0%,#1f4c3a 100%);color:#fff;border-radius:20px;padding:28px 24px;text-align:center;margin-bottom:18px;}
  .stage-pill{display:inline-block;padding:5px 14px;border-radius:999px;background:rgba(255,255,255,.15);font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;margin-bottom:12px;}
  .result-headline{font-size:22px;margin:0 0 8px;letter-spacing:-0.01em;}
  .stage-explain{font-size:13px;opacity:.85;margin:0 0 20px;max-width:440px;margin-left:auto;margin-right:auto;}
  .vet-banner{background:#fbe9e2;border:1px solid var(--warn);color:#8a3a1c;border-radius:12px;padding:14px 16px;font-size:14px;margin-bottom:16px;}
  .feline-note{font-size:12px;opacity:.8;margin-top:14px;font-style:italic;}
  .cta-row{display:flex;gap:10px;}
  footer.note{color:var(--muted);font-size:12px;text-align:center;margin-top:30px;}

  /* primary stats: Pet Age / Human Age */
  .stats-row{display:flex;justify-content:center;gap:28px;margin-bottom:22px;flex-wrap:wrap;}
  .stat-block{min-width:120px;}
  .stat-label{font-size:12px;text-transform:uppercase;letter-spacing:.06em;opacity:.75;margin-bottom:2px;}
  .stat-value{font-size:40px;font-weight:800;line-height:1.1;}
  .stat-value .unit{font-size:16px;font-weight:600;opacity:.8;}
  .stat-note{font-size:11px;opacity:.75;max-width:150px;margin:4px auto 0;}

  /* WHOOP-style health score */
  .health-score-card{display:flex;align-items:center;justify-content:center;gap:16px;background:rgba(0,0,0,.15);border-radius:16px;padding:16px 18px;text-align:left;}
  .score-ring{--pct:0;--ring-color:#4caf7d;width:80px;height:80px;border-radius:50%;flex-shrink:0;
    background:conic-gradient(var(--ring-color) calc(var(--pct)*1%), rgba(255,255,255,.18) 0);
    display:flex;align-items:center;justify-content:center;}
  .score-ring-inner{width:62px;height:62px;border-radius:50%;background:#1f4c3a;color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;}
  .score-title{font-size:13px;font-weight:700;}
  .score-zone{font-size:12px;opacity:.85;margin-bottom:4px;}
  .score-caption{font-size:12px;opacity:.85;max-width:220px;}

  /* watch-out-for / what-helps */
  .insight-card{text-align:left;}
  .insight-title{font-weight:700;font-size:15px;margin-bottom:10px;}
  .insight-card ul{margin:0;padding-left:20px;}
  .insight-card li{font-size:14px;color:var(--ink);margin-bottom:6px;line-height:1.4;}

  /* completion page */
  .complete-badge{display:inline-block;background:var(--brand-light);color:var(--brand);font-weight:700;font-size:13px;padding:6px 14px;border-radius:999px;margin-bottom:14px;}
  .multiplier-card{padding:24px;}
  .multiplier-card .stat-label{font-size:12px;text-transform:uppercase;letter-spacing:.06em;opacity:.8;}
  .multiplier-value{font-size:48px;font-weight:800;margin:6px 0;}
  .multiplier-explain{font-size:13px;opacity:.9;max-width:440px;margin:6px auto 10px;}
  .multiplier-tone{font-size:13px;opacity:.95;font-weight:600;}
  .section-title{font-weight:700;font-size:15px;margin-bottom:10px;}
  .bcs-summary{margin:0 0 4px;}
  .bcs-desc{color:var(--muted);font-size:13px;margin:0;}
  .soft-percentile{font-size:13px;color:var(--ink);margin:10px 0 0;}
  .balance-summary{margin-top:16px;}
  .balance-label{font-size:13px;font-weight:600;margin-bottom:6px;}
  .balance-bar{height:8px;border-radius:999px;background:var(--line);overflow:hidden;}
  .balance-fill{height:100%;background:var(--brand);border-radius:999px;transition:width .2s;}
  .balance-copy{font-size:13px;color:var(--muted);margin-top:6px;}
  .food-equation{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script src="frailty-model.js"></script>
<script src="age-estimator.js"></script>
<script>
/* ---------- Data model ---------- */
/* Deficit score: 0 absent, 0.5 mild, 1 severe/present.
   Age/FI model lives in frailty-model.js - see that file for the interim
   scoring model and its calibration TODO. */
const { lifeStage, lifeStageDisplay, fiZone, healthScore, healthMultiplier, foodActivityBalance,
        foodEquationMultiplier, foodBalancePercentile,
        catHumanEquivalent, dogHumanEquivalent, bcsToDeficit,
        estimatePhysiologicalAge, scoreActivityMinutes, classifyDelta,
        bandYears, AGE_GUESS, overweightPercentile, fuseAge, deltaPercentOfAge,
        BCS_CHART } = window.FrailtyModel;

const KG_PER_LB = 0.45359237;

/* Real veterinary reference charts (WSAVA/Daily Paws for dogs; Bjornvad/
   Laflamme via APOP for cats) - dropped in per the BCS-chart hook points
   already built into the BCS step. */
const BCS_REFERENCE_CHARTS = { dog: "assets/bcs-chart-dog.png", cat: "assets/bcs-chart-cat.webp" };

const SCALE3 = [
  {v:0,   label:"Not at all"},
  {v:0.5, label:"A little"},
  {v:1,   label:"Yes, noticeably"},
];

const PART1_CORE = [
  {id:"p1_mobility", system:"Mobility",
    text:{dog:"Any trouble with stairs, or jumping into the car?", cat:"Any reluctance or trouble jumping to a favorite high perch?"}},
  {id:"p1_activity", type:"minutes",
    text:{both:"On a typical day, about how many minutes of walking or active play does your pet get?"},
    hint:"Rough estimate is fine - total minutes across the whole day."},
  {id:"p1_exhaustion", text:{both:"Tires quickly on walks or play, or needs longer to recover?"}},
  {id:"p1_stiffness", text:{both:"Does your pet need a moment to get up after resting, or seem stiff for the first few steps?"}},
  {id:"p1_appetite", text:{both:"Any notable increase or decrease in eating?"}},
  {id:"p1_coat", text:{dog:"Coat duller or matting more than usual?", cat:"Coat duller, matting, or self-grooming less than usual?"}},
  {id:"p1_vitality", text:{both:"Overall - does your pet just seem a little less spry lately?"}, isGlobal:true},
];

const PART2 = [
  {id:"p2_vision", text:{both:"Bumping into things, or hesitant in dim light?"}},
  {id:"p2_hearing", text:{both:"Not responding to their name or familiar sounds?"}},
  {id:"p2_cognition", text:{both:"Staring at walls, getting \"stuck,\" or seeming confused?"}},
  {id:"p2_sleep", text:{both:"Restless nights, pacing, or a changed sleep schedule?"}},
  {id:"p2_interaction", text:{both:"More withdrawn, or unusually clingy compared to before?"}},
  {id:"p2_dental", text:{both:"Bad breath, visible tartar, or trouble chewing / dropping food?"}},
  {id:"p2_skin", text:{both:"Any new lumps, sores, or masses you can feel?"}, hint:"Just note it - this isn't a diagnosis."},
  {id:"p2_weight_trend", text:{both:"Noticeable weight loss or gain over recent months?"}},
];

const PART3 = [
  {id:"p3_water", text:{both:"Drinking noticeably more or less than usual?"}},
  {id:"p3_urination", text:{both:"Urinating more often, straining, or having accidents?"}},
  {id:"p3_continence", text:{both:"Any leaking of urine or stool, especially while resting?"}},
  {id:"p3_digestion", text:{both:"Recurring vomiting, diarrhea, or constipation?"}},
  {id:"p3_breathing", text:{both:"Coughing, panting at rest, or labored breathing?"}},
  {id:"p3_exercise_tolerance", text:{dog:"Has to stop and rest on normal walks?", cat:"Avoids movement or hides more than usual?"}},
  {id:"p3_muscle", text:{both:"Visible loss of muscle over the back or hind legs?"}},
  {id:"p3_temperature", text:{both:"Seeks out heat, reluctant in the cold, or newly sensitive to temperature?"}},
  {id:"p3_pain", text:{both:"Flinching when touched, reluctant to be handled, or vocalizing?"}},
];

const PART4 = [
  {id:"p4_diagnoses", text:{both:"How many ongoing conditions has a vet diagnosed?"}, opts:[{v:0,label:"None"},{v:0.5,label:"One"},{v:1,label:"Two or more"}]},
  {id:"p4_medications", text:{both:"How many daily medications right now?"}, opts:[{v:0,label:"None"},{v:0.5,label:"1–2"},{v:1,label:"3+"}]},
  {id:"p4_vet_visits", text:{both:"How often have vet visits been in the last 12 months?"}, opts:[{v:0,label:"Routine / annual"},{v:0.5,label:"A few times"},{v:1,label:"Frequent or urgent"}]},
  {id:"p4_dental_history", text:{both:"Any extractions or diagnosed periodontal disease?"}, opts:[{v:0,label:"No"},{v:0.5,label:"Mild / early"},{v:1,label:"Yes"}]},
  {id:"p4_surgical_history", text:{both:"Any major surgeries or unresolved injuries?"}, opts:[{v:0,label:"None"},{v:0.5,label:"Minor, resolved"},{v:1,label:"Major or unresolved"}]},
  {id:"p4_bloodwork", text:{both:"(Optional) If your vet has run bloodwork - any values flagged abnormal?"}, opts:[{v:0,label:"Normal / none flagged"},{v:1,label:"Abnormal flagged"}], optional:true},
  {id:"p4_organ_findings", text:{both:"(Optional) Any vet-noted findings - heart murmur, kidney values, etc.?"}, opts:[{v:0,label:"None noted"},{v:1,label:"Yes, noted"}], optional:true},
  {id:"p4_owner_concern", text:{both:"Anything else about them that's been worrying you?"}, opts:SCALE3},
];

/* Reproductive status detail is captured as a life-table modifier per the spec
   ("age modifier", not a deficit) - informational only, not part of the FI denominator. */

/* ---------- App state ---------- */
const state = {
  step:"baseline", // baseline -> bcs -> part1 -> result1 -> part2 -> result2 -> part3 -> result3 -> part4 -> result4 -> complete
  baseline:{
    species:"dog", name:"", breed:"",
    weightValue:20, weightUnit:"kg",
    sexNeuter:"male-neutered",
    dobKnown:true, dobMonth:"", dobDay:"", dobYear:"",
    yearsOnlyAge:"",
    bcs:5,
    photoFile:null, photoEstimate:null,
  },
  answers:{}, // id -> score
  followup:{
    exerciseMinutes:"", // seeded from p1_activity once the complete page first renders
    mealsPerDay:"",
    foodType:"",
    portionScore:null, // 0 (about right) / 0.5 (a bit more) / 1 (a lot more) - same deficit convention as everything else
    treatsScore:null,
  },
};

function weightKg(){
  const v = parseFloat(state.baseline.weightValue) || 0;
  return state.baseline.weightUnit === "lb" ? v * KG_PER_LB : v;
}

function dobAgeYears(){
  const b = state.baseline;
  if (!b.dobKnown) return null;
  const y = parseInt(b.dobYear), m = parseInt(b.dobMonth), d = parseInt(b.dobDay);
  if (!y || !m || !d) return null;
  const dob = new Date(y, m-1, d);
  if (isNaN(dob.getTime())) return null;
  const ms = Date.now() - dob.getTime();
  if (ms <= 0) return null;
  return Math.max(0.02, ms / (365.25*24*3600*1000));
}

/* Confidence-weighted fusion - the single seam where DOB, an owner years-only
   guess, a photo estimate, and a last-resort population prior all combine
   into one age value. A photo signal with confidence 0 (today's untrained
   backend) contributes nothing - this is how "don't rely on image
   estimation alone" is enforced structurally, not just in copy. */
function computeFinalAge(){
  const b = state.baseline;
  const signals = [];
  const dobAge = dobAgeYears();
  if (dobAge != null) signals.push({years: dobAge, confidence: 1});
  const yearsOnly = parseFloat(b.yearsOnlyAge);
  if (!b.dobKnown && Number.isFinite(yearsOnly) && yearsOnly > 0) signals.push({years: yearsOnly, confidence: 0.5});
  if (b.photoEstimate && b.photoEstimate.confidence > 0) {
    signals.push({years: b.photoEstimate.years, confidence: b.photoEstimate.confidence});
  }
  signals.push({years: AGE_GUESS.adult, confidence: 0.1}); // last-resort prior so fusion is never empty
  return fuseAge(signals);
}

function answeredScores(ids){
  return ids.map(id=>state.answers[id]).filter(v => v !== undefined);
}

function computeResult(partNumber){
  const idsByPart = {
    1: PART1_CORE.map(q=>q.id).concat(["p1_bcs"]),
    2: PART2.map(q=>q.id),
    3: PART3.map(q=>q.id),
    4: PART4.map(q=>q.id),
  };
  let allIds = [];
  for (let p=1;p<=partNumber;p++) allIds = allIds.concat(idsByPart[p]);
  const scores = answeredScores(allIds);
  const n = scores.length;
  const observedFI = n ? scores.reduce((a,b)=>a+b,0)/n : 0;

  const species = state.baseline.species;
  const weight = weightKg();
  const breed = state.baseline.breed;
  const { years: age, confidence: ageConfidence } = computeFinalAge();
  const {center, delta, eFI} = estimatePhysiologicalAge({species, chronAge: age, weightKg: weight, breed, observedFI});

  let band = bandYears(n);
  if (species === "cat") band *= 1.3; // Sofia/Priya: feline aging science lags dogs - widen the band

  const stage = lifeStage(species, age, weight); // feeds the expected-FI curve
  const stageDisplay = lifeStageDisplay(species, age, weight); // 4-bucket puppy/young/middle/senior, UI-only
  const zone = fiZone(observedFI);
  const score = healthScore(observedFI);
  const multiplier = healthMultiplier(observedFI, eFI);
  const deltaCategory = classifyDelta(delta);
  const overweightPct = overweightPercentile(species, state.baseline.bcs);

  return {
    n, observedFI, center, delta, deltaCategory, chronAge: age, ageConfidence, breed,
    low: Math.max(0.1, center-band), high: center+band,
    stage, stageDisplay, zone, score, multiplier, species, overweightPct,
    humanEq: species==="cat" ? catHumanEquivalent(center) : dogHumanEquivalent(center),
  };
}

/* ---------- Render ---------- */
const app = document.getElementById("app");

function speciesText(q){
  if (q.text.both) return q.text.both;
  return q.text[state.baseline.species];
}

function optRow(id, opts, hint){
  const cur = state.answers[id];
  return `<div class="opts" data-qid="${id}">` +
    opts.map(o => `<div class="opt ${cur===o.v?'sel':''}" data-val="${o.v}">${o.label}</div>`).join("") +
    `</div>` + (hint?`<div class="hint">${hint}</div>`:"");
}

function minutesInput(q){
  const raw = (state.raw && state.raw[q.id]) ?? "";
  return `<input type="number" class="minutes-input" data-qid="${q.id}" min="0" step="5" value="${raw}" placeholder="e.g. 30">`;
}

function questionBlock(q, opts){
  return `<div class="q">
    <label class="qtext">${speciesText(q)}</label>
    ${q.hint?`<div class="hint">${q.hint}</div>`:""}
    ${q.type==="minutes" ? minutesInput(q) : optRow(q.id, opts || SCALE3)}
  </div>`;
}

function progressHTML(activeIdx){
  const total = 5; // baseline+bcs+part1 counted as one visual stage, then 2,3,4, then done
  let segs = "";
  for (let i=0;i<4;i++){
    const cls = i < activeIdx ? "done" : (i===activeIdx ? "current" : "");
    segs += `<div class="seg ${cls}"></div>`;
  }
  return `<div class="progress">${segs}</div>`;
}

function render(){
  const s = state.step;
  if (s === "baseline") return renderBaseline();
  if (s === "bcs") return renderBCS();
  if (s === "part1") return renderPart("part1");
  if (s === "part2") return renderPart("part2");
  if (s === "part3") return renderPart("part3");
  if (s === "part4") return renderPart("part4");
  if (s.startsWith("result")) return renderResult(parseInt(s.replace("result","")));
  if (s === "complete") return renderComplete();
}

function photoStatusLine(b){
  if (!b.photoFile) return "No photo selected yet.";
  const est = b.photoEstimate;
  if (!est || est.status === "checking") return `Selected: ${b.photoFile.name} - analyzing…`;
  if (est.confidence > 0) return `Selected: ${b.photoFile.name} - estimated ~${Math.round(est.years)} yrs (used as one signal, not the final answer).`;
  return `Selected: ${b.photoFile.name} - no confident read yet (photo model isn't trained), other signals used instead.`;
}

function renderBaseline(){
  const b = state.baseline;
  const currentYear = new Date().getFullYear();
  const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const monthOptions = `<option value="">Month</option>` + monthNames
    .map((m,i)=>`<option value="${i+1}" ${String(b.dobMonth)===String(i+1)?'selected':''}>${m}</option>`).join("");

  app.innerHTML = `
    <header class="top"><div class="logo">🐾 Pawl</div></header>
    ${progressHTML(0)}
    <h1>Let's see how spry ${b.name || "your pet"} really is.</h1>
    <p class="lead">90 seconds, a few quick observations, and you'll get a vitality estimate - not a diagnosis.</p>
    <div class="card">
      <div class="species-toggle">
        <div class="opt ${b.species==='dog'?'sel':''}" data-species="dog">🐶 Dog</div>
        <div class="opt ${b.species==='cat'?'sel':''}" data-species="cat">🐱 Cat</div>
      </div>
      <div class="q"><label class="qtext">Name</label>
        <input type="text" id="f-name" value="${b.name}" placeholder="Bella"></div>
      <div class="q"><label class="qtext">Breed (or best guess)</label>
        <input type="text" id="f-breed" value="${b.breed}" placeholder="Labrador mix"></div>
      <div class="row2">
        <div class="q"><label class="qtext">Adult weight</label>
          <div class="weight-row">
            <input type="number" id="f-weight" value="${b.weightValue}" min="0.2" step="0.1">
            <div class="unit-toggle">
              <div class="opt ${b.weightUnit==='kg'?'sel':''}" data-unit="kg">kg</div>
              <div class="opt ${b.weightUnit==='lb'?'sel':''}" data-unit="lb">lb</div>
            </div>
          </div>
        </div>
        <div class="q"><label class="qtext">Sex & neuter status</label>
          <select id="f-sex">
            <option value="male-intact" ${b.sexNeuter==='male-intact'?'selected':''}>Male, intact</option>
            <option value="male-neutered" ${b.sexNeuter==='male-neutered'?'selected':''}>Male, neutered</option>
            <option value="female-intact" ${b.sexNeuter==='female-intact'?'selected':''}>Female, intact</option>
            <option value="female-spayed" ${b.sexNeuter==='female-spayed'?'selected':''}>Female, spayed</option>
          </select></div>
      </div>
      <div class="q">
        <label class="qtext">Date of birth</label>
        <div class="unknown-toggle">
          <label><input type="checkbox" id="f-dob-unknown" ${b.dobKnown?'':'checked'}> I don't know the exact date</label>
        </div>
        ${b.dobKnown ? `
        <div class="dob-row">
          <select id="f-dob-month">${monthOptions}</select>
          <input type="number" id="f-dob-day" placeholder="Day" min="1" max="31" value="${b.dobDay}">
          <input type="number" id="f-dob-year" placeholder="Year" min="${currentYear-30}" max="${currentYear}" value="${b.dobYear}">
        </div>` : `
        <div class="q" style="margin-top:10px;margin-bottom:0;">
          <label class="qtext">Best guess - age in years</label>
          <input type="number" id="f-years-only" min="0" step="0.5" value="${b.yearsOnlyAge}" placeholder="e.g. 6">
          <div class="hint">Rough is fine - a photo below, plus your answers, help sharpen it.</div>
        </div>`}
      </div>
      <div class="q" style="margin-bottom:0;">
        <label class="qtext">Photo (optional)</label>
        <div class="hint">Helps refine the age estimate - combined with the info above, never used alone.</div>
        <input type="file" id="f-photo" accept="image/*">
        <div class="photo-status">${photoStatusLine(b)}</div>
      </div>
    </div>
    <button class="primary" id="next-baseline">Start the vitality check →</button>
  `;

  document.querySelectorAll("[data-species]").forEach(el=>el.onclick=()=>{
    state.baseline.species = el.dataset.species; render();
  });
  document.getElementById("f-name").oninput = e=> state.baseline.name = e.target.value;
  document.getElementById("f-breed").oninput = e=> state.baseline.breed = e.target.value;
  document.getElementById("f-weight").oninput = e=> state.baseline.weightValue = parseFloat(e.target.value)||0;
  document.querySelectorAll("[data-unit]").forEach(el=>el.onclick=()=>{
    state.baseline.weightUnit = el.dataset.unit; render();
  });
  document.getElementById("f-sex").onchange = e=> state.baseline.sexNeuter = e.target.value;
  document.getElementById("f-dob-unknown").onchange = e=>{ state.baseline.dobKnown = !e.target.checked; render(); };

  const monthEl = document.getElementById("f-dob-month");
  if (monthEl) monthEl.onchange = e=> state.baseline.dobMonth = e.target.value;
  const dayEl = document.getElementById("f-dob-day");
  if (dayEl) dayEl.oninput = e=> state.baseline.dobDay = e.target.value;
  const yearEl = document.getElementById("f-dob-year");
  if (yearEl) yearEl.oninput = e=> state.baseline.dobYear = e.target.value;
  const yearsOnlyEl = document.getElementById("f-years-only");
  if (yearsOnlyEl) yearsOnlyEl.oninput = e=> state.baseline.yearsOnlyAge = e.target.value;

  document.getElementById("f-photo").onchange = async e=>{
    const file = e.target.files[0];
    if (!file) return;
    state.baseline.photoFile = file;
    state.baseline.photoEstimate = {status:"checking", years:null, confidence:0};
    render();
    const result = await PawlAgeEstimator.estimateAgeFromPhoto(file, {species: state.baseline.species});
    state.baseline.photoEstimate = result;
    render();
  };

  document.getElementById("next-baseline").onclick = ()=>{
    // A photo was provided - skip the manual body-condition step. BCS then
    // stays at its default (5, ideal) and p1_bcs is never scored, same
    // "skipped items don't count" rule already used elsewhere in the flow.
    state.step = b.photoFile ? "part1" : "bcs";
    render();
  };
}

function renderBCS(){
  const b = state.baseline;
  const chart = BCS_CHART[b.species];
  const cur = chart.find(c=>c.bcs===b.bcs) || chart[4];
  app.innerHTML = `
    <header class="top"><div class="logo">🐾 Pawl</div></header>
    ${progressHTML(0)}
    <h1>How's ${b.name || "your pet"}'s body condition?</h1>
    <p class="lead">Compare against the chart below - ribs, waist, and profile are the tells, not the scale.</p>
    <div class="card">
      <div class="bcs-chart-preview" data-img-hook="${cur.imageHook}">
        <img class="bcs-chart-thumb" id="bcs-chart-thumb" src="${BCS_REFERENCE_CHARTS[b.species]}" alt="${b.species} body condition reference chart">
        <div><a class="chart-btn" href="${BCS_REFERENCE_CHARTS[b.species]}" target="_blank" rel="noopener">View full-size chart ↗</a></div>
      </div>
      <div class="q" style="margin-top:16px;margin-bottom:0;">
        <input type="range" id="f-bcs" min="1" max="9" step="1" value="${b.bcs}">
        <div class="bcs-scale"><span>1 · too thin</span><span>5 · ideal</span><span>9 · obese</span></div>
      </div>
      <div class="bcs-readout">
        <strong>${b.bcs} - ${cur.label}</strong>
        <p>${cur.desc}</p>
      </div>
    </div>
    <button class="primary" id="next-bcs">Continue →</button>
  `;
  document.getElementById("f-bcs").oninput = e=>{
    state.baseline.bcs = parseInt(e.target.value);
    state.answers.p1_bcs = bcsToDeficit(state.baseline.bcs);
    render();
  };
  document.getElementById("bcs-chart-thumb").onclick = ()=> window.open(BCS_REFERENCE_CHARTS[b.species], "_blank");
  state.answers.p1_bcs = bcsToDeficit(state.baseline.bcs);
  document.getElementById("next-bcs").onclick = ()=>{ state.step="part1"; render(); };
}

const PART_META = {
  part1: {items:PART1_CORE, title:"Round 1 - the basics", idx:0, num:1},
  part2: {items:PART2, title:"Round 2 - senses & mind", idx:1, num:2},
  part3: {items:PART3, title:"Round 3 - internal signals", idx:2, num:3},
  part4: {items:PART4, title:"Round 4 - history & context", idx:3, num:4},
};

function renderPart(key){
  const meta = PART_META[key];
  app.innerHTML = `
    <header class="top"><div class="logo">🐾 Pawl</div></header>
    ${progressHTML(meta.idx)}
    <h1>${meta.title}</h1>
    <p class="lead">${meta.num===1 ? "Answer what you can - skip anything you're unsure of." : "Every extra answer sharpens the estimate."}</p>
    <div class="card">
      ${meta.items.map(q => questionBlock(q, q.opts)).join("")}
    </div>
    <button class="primary" id="next-part">See ${meta.num===1?"my estimate":"the sharpened estimate"} →</button>
  `;
  app.querySelectorAll(".opts").forEach(row=>{
    row.querySelectorAll(".opt").forEach(o=>{
      o.onclick = ()=>{
        state.answers[row.dataset.qid] = parseFloat(o.dataset.val);
        render();
      };
    });
  });
  app.querySelectorAll(".minutes-input").forEach(inp=>{
    inp.oninput = ()=>{
      const raw = parseFloat(inp.value);
      state.raw = state.raw || {};
      state.raw[inp.dataset.qid] = isNaN(raw) ? undefined : raw;
      state.answers[inp.dataset.qid] = scoreActivityMinutes(state.baseline.species, raw, weightKg(), state.baseline.breed);
      // deliberately no render() here - re-rendering innerHTML on every
      // keystroke would blow away focus/cursor mid-typing (same reason
      // f-name/f-breed/f-weight above don't re-render either).
    };
  });
  document.getElementById("next-part").onclick = ()=>{ state.step = "result"+meta.num; render(); };
}

/* Aging-pace copy is percentage-based (delta as % of chronological age) per
   product direction, replacing the earlier multiplier/qualitative-only
   framing. Still never shows a raw FI percentage - only this derived ratio. */
function deltaCopy(delta, chronAge, category){
  if (category === "typical") return "Aging right in line with expectations for their age.";
  const pct = Math.abs(deltaPercentOfAge(delta, chronAge));
  const dir = category === "slower" ? "slower" : "faster";
  const tone = category === "slower" ? "nice work." : "nothing urgent, just a good nudge to keep supporting them.";
  return `Aging about ${pct}% ${dir} than typical for their age - ${tone}`;
}

const STAGE_ICON = {puppy:"🍼", young:"⚡", middle:"🌿", senior:"🍂"};

function stageLabelText(stage, species){
  if (stage === "puppy") return species === "cat" ? "Kitten" : "Puppy";
  return {young:"Young", middle:"Middle-aged", senior:"Senior"}[stage];
}

const STAGE_EXPLAIN = {
  puppy: "The fastest-changing stage of life - bones, brain, and lifelong habits are all still forming right now.",
  young: "Physically mature and in their prime - the easiest window to lock in habits that pay off for years.",
  middle: "Aging starts quietly here, often before it's visible day-to-day - small proactive changes now matter most.",
  senior: "Their body needs more support than before - comfort, mobility, and catching issues early are the priority.",
};

/* Species/stage-tailored care content - general veterinary-informed
   guidance, not a clinical protocol (the existing "wellness estimate, not a
   diagnosis" footer still applies). Dynamic entries from
   personalizedInsights() below get prepended based on this pet's actual
   answers, so the list isn't purely static/generic. */
const STAGE_CONTENT = {
  puppy: {
    dog: {
      watch: ["Growth-plate injuries from too much high-impact exercise or jumping", "Gaps opening up in the vaccination or parasite-prevention schedule", "Fear/socialization windows closing without enough varied, positive exposure"],
      help: ["Keep exercise short and gentle - skip forced runs or big jumps until they're fully grown", "Stay on schedule with vaccines, deworming, and vet checkups", "Start positive-reinforcement training and socialization now - it's easiest at this age"],
    },
    cat: {
      watch: ["Gaps opening up in the vaccination or parasite-prevention schedule", "Risky climbing or exploring before coordination fully develops", "Litter-box or scratching habits forming the wrong way early on"],
      help: ["Kitten-proof the home - secure cords, small objects, and high ledges", "Stay on schedule with vaccines and parasite prevention", "Handle and socialize gently across varied situations now"],
    },
  },
  young: {
    dog: {
      watch: ["Weight creeping up as growth slows but feeding stays puppy-level", "Under-exercising a body that's still at peak energy", "Dental tartar starting to build unnoticed"],
      help: ["Switch to adult-formula food at the right portion for their size", "Keep daily exercise consistent - this is the highest-energy window", "Start a dental routine (brushing or dental chews) before problems build"],
    },
    cat: {
      watch: ["Indoor weight gain from a mostly sedentary lifestyle", "Dental tartar starting to build unnoticed", "Stress-related litter-box issues"],
      help: ["Keep portions in check, especially after spay/neuter", "Give daily play sessions to burn energy and prevent boredom", "Start a dental routine now - easier than catching up later"],
    },
  },
  middle: {
    dog: {
      watch: ["Weight gain as metabolism quietly slows", "Early joint stiffness or reduced stamina on walks", "Dental or organ-function changes that don't show obvious symptoms yet"],
      help: ["Track body condition closely, adjusting food or exercise before it becomes a problem", "Add joint-friendly exercise (swimming, controlled walks) and ask about supplements", "Start annual bloodwork now if you haven't - it catches changes early"],
    },
    cat: {
      watch: ["Weight gain, especially if activity has dropped", "Early kidney or dental changes that are easy to miss", "Reduced grooming leading to coat or skin issues"],
      help: ["Keep an eye on water intake and litter box habits", "Keep play sessions regular to maintain muscle and mobility", "Ask your vet about baseline bloodwork if you haven't already"],
    },
  },
  senior: {
    dog: {
      watch: ["Joint pain and reduced mobility", "Cognitive changes - confusion, disrupted sleep, pacing", "Organ issues (kidney, heart) that can hide behind normal-looking behavior"],
      help: ["Support mobility with ramps, orthopedic bedding, and vet-guided exercise or joint supplements", "Keep a predictable daily routine to ease cognitive stress", "Move to twice-yearly vet checkups - it catches issues earlier"],
    },
    cat: {
      watch: ["Weight loss - common in cats and easy to miss early", "Reduced mobility making litter box access harder", "Kidney or thyroid issues becoming more common"],
      help: ["Watch weight and appetite closely - unexplained loss is the #1 early flag", "Make litter boxes and favorite spots easier to reach (lower sides, ramps, steps)", "Move to twice-yearly vet checkups with bloodwork"],
    },
  },
};

/* Merges the static species/stage content with a couple of dynamic entries
   pulled straight from this pet's own answers (vet-flag zone, overweight
   percentile) - capped at 3 each so nothing gets cluttered or duplicated. */
function personalizedInsights(r){
  const base = STAGE_CONTENT[r.stageDisplay][r.species];
  let watch = base.watch.slice();
  let help = base.help.slice();
  if (r.zone.vet) watch = ["A few of today's answers are worth flagging to your vet soon", ...watch].slice(0,3);
  if (r.overweightPct != null) help = ["Body condition is the highest-impact lever right now - small portion and activity changes add up fast", ...help].slice(0,3);
  return {watch, help};
}

function scoreRingColor(score){
  if (score >= 70) return "#4caf7d";
  if (score >= 40) return "#e8a33d";
  return "#c65a2e";
}

function renderResult(partNumber){
  const r = computeResult(partNumber);
  const name = state.baseline.name || "Your pet";
  const nextPart = partNumber+1;
  const isLast = partNumber===4;
  // Single fused figure, no range shown - a deliberate product-direction
  // change (this pass) from the earlier range-plus-headline display.
  // Under 1yr, "0 yrs" reads as broken for a puppy/kitten - show months instead.
  const ageDisplay = r.center < 1
    ? {value: Math.max(1, Math.round(r.center*12)), unit: " mo"}
    : {value: Math.round(r.center), unit: " yrs"};
  const stageText = stageLabelText(r.stageDisplay, r.species);
  const { watch, help } = personalizedInsights(r);
  const ringColor = scoreRingColor(r.score);
  // Uncertainty is reflected in tone, not a raw confidence percentage.
  const ageSoftener = r.ageConfidence >= 0.9 ? "" : `<div class="stat-note">Estimated - sharpens as you answer more</div>`;

  app.innerHTML = `
    <header class="top"><div class="logo">🐾 Pawl</div></header>
    ${progressHTML(Math.min(partNumber,3))}
    ${r.zone.vet ? `<div class="vet-banner">💬 ${name}'s answers suggest it's worth a check-in with your vet soon. This isn't a diagnosis - just a nudge to get eyes on it.</div>` : ""}
    <div class="result">
      <div class="stage-pill">${STAGE_ICON[r.stageDisplay]} ${stageText} stage</div>
      <h1 class="result-headline">${name} is in the ${stageText} stage</h1>
      <p class="stage-explain">${STAGE_EXPLAIN[r.stageDisplay]}</p>

      <div class="stats-row">
        <div class="stat-block">
          <div class="stat-label">Pet Age</div>
          <div class="stat-value">${ageDisplay.value}<span class="unit">${ageDisplay.unit}</span></div>
          ${ageSoftener}
        </div>
        ${r.humanEq ? `
        <div class="stat-block">
          <div class="stat-label">Human Age</div>
          <div class="stat-value">${r.humanEq}<span class="unit"> yrs</span></div>
          <div class="stat-note">What a human would be at the same biological stage - not ${name}'s real age</div>
        </div>` : ""}
      </div>

      <div class="health-score-card">
        <div class="score-ring" style="--pct:${r.score};--ring-color:${ringColor}">
          <div class="score-ring-inner">${r.score}</div>
        </div>
        <div class="score-meta">
          <div class="score-title">Health Score</div>
          <div class="score-zone">${r.zone.label}</div>
          <div class="score-caption">${deltaCopy(r.delta, r.chronAge, r.deltaCategory)}</div>
        </div>
      </div>
      ${r.species==="cat" ? `<div class="feline-note">Feline estimate - the science here is still maturing, so this reads a touch less precise.</div>` : ""}
    </div>

    <div class="card insight-card">
      <div class="insight-title">⚠️ Watch out for</div>
      <ul>${watch.map(w=>`<li>${w}</li>`).join("")}</ul>
    </div>
    <div class="card insight-card">
      <div class="insight-title">✅ What helps</div>
      <ul>${help.map(h=>`<li>${h}</li>`).join("")}</ul>
    </div>

    <p class="lead" style="text-align:center;">This combines their age, body condition, and today's answers - it gets sharper with each round (${r.n} observations so far).</p>
    ${!isLast ? `
      <div class="cta-row">
        <button class="primary" id="next-round">Sharpen this estimate - round ${nextPart} →</button>
      </div>
      <button class="ghost" id="stop-here">I'm happy with this estimate</button>
    ` : `
      <div class="cta-row">
        <button class="primary" id="finish-setup">Finish setting up ${name}'s profile →</button>
      </div>
    `}
    <footer class="note">Wellness estimate only. Not a diagnosis or life-expectancy prediction.</footer>
  `;
  if (!isLast){
    document.getElementById("next-round").onclick = ()=>{ state.step="part"+nextPart; render(); };
    document.getElementById("stop-here").onclick = ()=>{ state.step="complete"; render(); };
  } else {
    document.getElementById("finish-setup").onclick = ()=>{ state.step="complete"; render(); };
  }
}

/* ---------- Completion page (page 3) ---------- */

function currentFoodActivityBalance(){
  const b = state.baseline, f = state.followup;
  const minutes = parseFloat(f.exerciseMinutes);
  const activityDeficit = Number.isFinite(minutes) ? scoreActivityMinutes(b.species, minutes, weightKg(), b.breed) : null;
  return foodActivityBalance({activityDeficit, portionScore:f.portionScore, treatsScore:f.treatsScore});
}

function balanceCopy(pct){
  if (pct == null) return "Add a bit of info below to see how food and activity balance out.";
  if (pct >= 80) return `${pct}% - well matched to their size and energy needs.`;
  if (pct >= 55) return `${pct}% - solid overall, with a little room to tighten up.`;
  return `${pct}% - a good opportunity to adjust portions or activity, nothing drastic.`;
}

/* Reframes the "Top N% most overweight" percentile as a comparison, not a
   ranking someone can "lose" - avoids the judged-by-a-leaderboard feel while
   staying factually equivalent. */
function percentileSoftCopy(pct, species){
  if (pct == null) return null;
  return `Fuller-bodied than roughly ${100-pct}% of ${species}s their size - worth keeping an eye on, nothing alarming.`;
}

function followupOptRow(field, opts){
  const cur = state.followup[field];
  return `<div class="opts" data-field="${field}">` +
    opts.map(o => `<div class="opt ${cur===o.v?'sel':''}" data-val="${o.v}">${o.label}</div>`).join("") +
    `</div>`;
}

function foodEquationCopy(bal, species){
  if (bal == null) return "Add a bit of info above to see the food equation.";
  const mult = foodEquationMultiplier(bal);
  const pct = foodBalancePercentile(bal);
  return `${mult}x - better-balanced than about ${pct}% of ${species}s (0.75x-1.75x range, 1.0x is the middle, no hard cutoff either end).`;
}

function updateBalanceUI(){
  const bal = currentFoodActivityBalance();
  const fill = document.getElementById("balance-fill");
  const copy = document.getElementById("balance-copy");
  const equation = document.getElementById("food-equation-copy");
  if (fill) fill.style.width = (bal ?? 0) + "%";
  if (copy) copy.textContent = balanceCopy(bal);
  if (equation) equation.textContent = foodEquationCopy(bal, state.baseline.species);
}

function renderComplete(){
  const b = state.baseline;
  const f = state.followup;
  const name = b.name || "Your pet";
  if (!f.exerciseMinutes && state.raw && state.raw.p1_activity != null){
    f.exerciseMinutes = String(state.raw.p1_activity); // carry the onboarding answer forward instead of asking twice
  }
  const r = computeResult(4); // safe regardless of how many rounds were actually completed - unanswered ids just don't count
  const chart = BCS_CHART[b.species];
  const bcsEntry = chart.find(c=>c.bcs===b.bcs) || chart[4];
  const balance = currentFoodActivityBalance();
  const multiplierTone = r.multiplier <= 1.15
    ? "Right around typical for their age - a good, neutral baseline."
    : r.multiplier <= 1.4
      ? "A touch above typical - nothing urgent, just a signal to keep supporting them."
      : "Noticeably above typical - worth folding into your next vet conversation.";

  app.innerHTML = `
    <header class="top"><div class="logo">🐾 Pawl</div></header>
    <div class="complete-badge">✅ Profile complete</div>
    <h1>${name}'s profile is set up</h1>
    <p class="lead">This is the start, not the finish - Pawl keeps refining ${name}'s picture as you add more over time. Extra assessments can be layered in later without redoing any of this.</p>

    <div class="result multiplier-card">
      <div class="stat-label">Health Multiplier</div>
      <div class="multiplier-value">${r.multiplier.toFixed(2)}x</div>
      <p class="multiplier-explain">This compares ${name}'s current signals to what's typical for their age - 1.0x is the neutral baseline. It's a wellness and longevity-potential signal, not a lifespan guarantee.</p>
      <div class="multiplier-tone">${multiplierTone}</div>
    </div>

    <div class="card">
      <div class="section-title">Body condition</div>
      <p class="bcs-summary"><strong>${b.bcs} - ${bcsEntry.label}</strong></p>
      <p class="bcs-desc">${bcsEntry.desc}</p>
      ${r.overweightPct != null ? `<p class="soft-percentile">${percentileSoftCopy(r.overweightPct, b.species)}</p>` : ""}
      <p class="hint" style="margin-top:10px;margin-bottom:0;">Body condition is its own signal - related to the health multiplier above, but not the same thing as their age or life stage.</p>
    </div>

    <div class="card">
      <div class="section-title">Wearable connection</div>
      <p class="hint">Optional. Connecting a wearable lets Pawl use real activity data instead of estimates, sharpening the health multiplier and food/activity balance over time.</p>
      <button class="ghost" id="connect-wearable">Connect a wearable</button>
      <div class="hint" id="wearable-status" style="margin-top:8px;"></div>
    </div>

    <div class="card">
      <div class="section-title">Activity & food</div>
      <div class="row2">
        <div class="q">
          <label class="qtext">Exercise (min/day)</label>
          <input type="number" id="f-exercise" min="0" step="5" value="${f.exerciseMinutes}">
        </div>
        <div class="q">
          <label class="qtext">Meals per day</label>
          <input type="number" id="f-meals" min="1" step="1" value="${f.mealsPerDay}">
        </div>
      </div>
      <div class="q">
        <label class="qtext">What do they eat?</label>
        <select id="f-food-type">
          <option value="">Pick one</option>
          <option value="kibble" ${f.foodType==='kibble'?'selected':''}>Dry kibble</option>
          <option value="wet" ${f.foodType==='wet'?'selected':''}>Wet food</option>
          <option value="raw" ${f.foodType==='raw'?'selected':''}>Raw or fresh</option>
          <option value="homemade" ${f.foodType==='homemade'?'selected':''}>Homemade</option>
          <option value="mixed" ${f.foodType==='mixed'?'selected':''}>Mixed</option>
        </select>
      </div>
      <div class="q">
        <label class="qtext">Portion size vs. what's recommended</label>
        ${followupOptRow("portionScore", [{v:0,label:"About right"},{v:0.5,label:"A bit more"},{v:1,label:"A lot more"}])}
      </div>
      <div class="q" style="margin-bottom:0;">
        <label class="qtext">Treats & extras</label>
        ${followupOptRow("treatsScore", [{v:0,label:"Rarely"},{v:0.5,label:"Sometimes"},{v:1,label:"Often"}])}
      </div>
      <div class="balance-summary">
        <div class="balance-label">Food & activity balance</div>
        <div class="balance-bar"><div class="balance-fill" id="balance-fill" style="width:${balance ?? 0}%"></div></div>
        <div class="balance-copy" id="balance-copy">${balanceCopy(balance)}</div>
      </div>
      <div class="food-equation">
        <div class="balance-label">Food equation</div>
        <div class="balance-copy" id="food-equation-copy">${foodEquationCopy(balance, b.species)}</div>
      </div>
    </div>

    <p class="lead" style="text-align:center;">Let's keep setting this up over time - extra assessments can be added later without redoing this setup.</p>
    <footer class="note">Wellness estimate only. Not a diagnosis or life-expectancy prediction.</footer>
  `;

  document.getElementById("f-exercise").oninput = e=>{ state.followup.exerciseMinutes = e.target.value; updateBalanceUI(); };
  document.getElementById("f-meals").oninput = e=>{ state.followup.mealsPerDay = e.target.value; };
  document.getElementById("f-food-type").onchange = e=>{ state.followup.foodType = e.target.value; };
  app.querySelectorAll(".opts[data-field]").forEach(row=>{
    row.querySelectorAll(".opt").forEach(o=>{
      o.onclick = ()=>{ state.followup[row.dataset.field] = parseFloat(o.dataset.val); render(); };
    });
  });
  document.getElementById("connect-wearable").onclick = ()=>{
    document.getElementById("wearable-status").textContent =
      "Wearable syncing isn't live yet - this button is ready for when it is. Everything above keeps working fine without it.";
  };
}

render();
</script>
</body>
</html>
